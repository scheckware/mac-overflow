name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-release:
    name: Check for release
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release is needed
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          dry_run: true
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release check result
        run: |
          echo "New release: ${{ steps.semantic.outputs.new_release_published }}"
          echo "Version: ${{ steps.semantic.outputs.new_release_version }}"

  build-and-release:
    name: Build & Release
    needs: check-release
    if: needs.check-release.outputs.new_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build universal binary
        run: |
          echo "Building for arm64..."
          swift build -c release --arch arm64

          echo "Building for x86_64..."
          swift build -c release --arch x86_64

          echo "Creating universal binary..."
          mkdir -p .build/universal
          lipo -create \
            .build/arm64-apple-macosx/release/MacOverflow \
            .build/x86_64-apple-macosx/release/MacOverflow \
            -output .build/universal/MacOverflow

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm -f cert.p12
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

      - name: Create + sign app bundle
        env:
          MARKETING_VERSION: ${{ needs.check-release.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          mkdir -p build/MacOverflow.app/Contents/MacOS
          mkdir -p build/MacOverflow.app/Contents/Resources
          cp .build/universal/MacOverflow build/MacOverflow.app/Contents/MacOS/
          chmod +x build/MacOverflow.app/Contents/MacOS/MacOverflow
          ./scripts/generate-info-plist.sh > build/MacOverflow.app/Contents/Info.plist
          cp LICENSE build/MacOverflow.app/Contents/Resources/LICENSE.txt
          IDENTITY=$(security find-identity -v -p codesigning | grep -m1 "Developer ID Application" | sed -E 's/^[^"]*"([^"]+)".*/\1/')
          echo "Signing with: $IDENTITY"
          codesign --force --options runtime --timestamp --sign "$IDENTITY" build/MacOverflow.app
          codesign --verify --strict --verbose=2 build/MacOverflow.app

      - name: Notarize + staple
        env:
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8 }}
        run: |
          echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > notary_key.p8
          export NOTARY_KEY_PATH="$PWD/notary_key.p8"
          bash scripts/notarize.sh build/MacOverflow.app
          rm -f notary_key.p8

      - name: Create ZIP
        id: zip
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          cd build
          # ditto preserves the stapled ticket + signature; keepParent keeps the .app wrapper.
          ditto -c -k --keepParent MacOverflow.app "MacOverflow-${VERSION}.zip"
          echo "sha256=$(shasum -a 256 "MacOverflow-${VERSION}.zip" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          brew install create-dmg || true
          bash scripts/make-dmg.sh build/MacOverflow.app "build/MacOverflow-${VERSION}.dmg"

      - name: Update Homebrew cask
        env:
          VERSION: ${{ needs.check-release.outputs.version }}
          SHA256: ${{ steps.zip.outputs.sha256 }}
        run: |
          sed -i '' 's/version ".*"/version "'"${VERSION}"'"/' Casks/mac-overflow.rb
          sed -i '' 's/sha256 .*/sha256 "'"${SHA256}"'"/' Casks/mac-overflow.rb
          echo "Updated cask to version ${VERSION} with SHA256 ${SHA256}"
          cat Casks/mac-overflow.rb

      - name: Sync with remote
        run: |
          git stash
          git pull --rebase origin main
          git stash pop

      - name: Run semantic-release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-release.outputs.version }}
        run: |
          gh release upload "v${VERSION}" \
            "build/MacOverflow-${VERSION}.zip" \
            "build/MacOverflow-${VERSION}.dmg" \
            --clobber
